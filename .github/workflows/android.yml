name: Build Android APK

on:
  push:
    branches: [main]
    paths: ["android/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.11.1
          fi

      - name: Write API key
        working-directory: android
        run: echo "API_KEY=${{ secrets.MIMO_API_KEY }}" >> local.properties

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mimo-tts-apk
          path: android/app/build/outputs/apk/release/mimo-tts.apk

      - name: Create Tag and Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.$(date +%Y%m%d%H%M%S)"
          gh release create "$TAG" \
            android/app/build/outputs/apk/release/mimo-tts.apk \
            --title "MiMo TTS Studio $TAG" \
            --notes "Android APK build from $(git rev-parse --short HEAD)"
